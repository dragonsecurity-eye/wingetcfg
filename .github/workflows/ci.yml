name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: go vet ./...
      - run: go test -v -race ./...
      - run: go build ./...
